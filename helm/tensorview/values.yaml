replicaCount: 1

image:
  repository: ghcr.io/qlghmz/ai-tensorview-cc
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  SUPABASE_URL: ""
  SUPABASE_PUBLISHABLE_KEY: ""
  SUPABASE_SERVICE_ROLE_KEY: ""
  DASHSCOPE_API_KEY: ""

ollama:
  enabled: false
  image: ollama/ollama:latest
  model: llama3.2

ingress:
  enabled: false
  host: ai.example.com
  tls: false

resources: {}
